<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOTE ROHIT — DP Badge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #04060c; }
  .badge { width: 1080px; height: 1080px; position: relative; }
  svg { display: block; }
</style>
</head>
<body>

<div class="badge">
<svg width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <clipPath id="photoClip"><circle cx="540" cy="540" r="386"/></clipPath>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD84D"/>
      <stop offset="0.55" stop-color="#FFC300"/>
      <stop offset="1" stop-color="#E8AB00"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0" stop-color="#1A1430"/>
      <stop offset="0.6" stop-color="#0B0E1A"/>
      <stop offset="1" stop-color="#070A13"/>
    </radialGradient>
    <!-- text arcs -->
    <path id="arcTop" d="M 540 540 m -462 0 a 462 462 0 1 1 924 0" fill="none"/>
    <path id="arcBottom" d="M 540 540 m -462 0 a 462 462 0 1 0 924 0" fill="none"/>
  </defs>

  <!-- background -->
  <rect width="1080" height="1080" fill="url(#bgGlow)"/>

  <!-- faint grid -->
  <g stroke="rgba(245,247,255,0.03)" stroke-width="1">
    <path d="M0 135H1080M0 270H1080M0 405H1080M0 540H1080M0 675H1080M0 810H1080M0 945H1080"/>
    <path d="M135 0V1080M270 0V1080M405 0V1080M540 0V1080M675 0V1080M810 0V1080M945 0V1080"/>
  </g>

  <!-- scattered stars -->
  <g fill="#FFC300">
    <text x="120" y="180" font-size="34" opacity="0.5">✦</text>
    <text x="930" y="220" font-size="26" opacity="0.4">★</text>
    <text x="90" y="900" font-size="24" opacity="0.35">★</text>
    <text x="950" y="930" font-size="34" opacity="0.5">✦</text>
    <text x="180" y="1010" font-size="20" opacity="0.3">✧</text>
    <text x="880" y="90" font-size="20" opacity="0.3">✧</text>
  </g>

  <!-- outer ring band -->
  <circle cx="540" cy="540" r="462" fill="none" stroke="#0E1322" stroke-width="128"/>
  <circle cx="540" cy="540" r="526" fill="none" stroke="url(#goldGrad)" stroke-width="7"/>
  <circle cx="540" cy="540" r="398" fill="none" stroke="url(#goldGrad)" stroke-width="7"/>

  <!-- photo -->
  <image href="profilephoto.png" x="154" y="120" width="772" height="1030"
         preserveAspectRatio="xMidYMin slice" clip-path="url(#photoClip)"/>
  <!-- bottom dark fade inside photo for depth -->
  <circle cx="540" cy="540" r="386" fill="none" stroke="rgba(7,10,19,0.35)" stroke-width="26"/>

  <!-- curved text: top -->
  <text font-family="'JetBrains Mono', monospace" font-size="44" font-weight="700"
        letter-spacing="14" fill="#F5F7FF">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">★ ACE AWARDS 2026 · TOP 8 FINALIST ★</textPath>
  </text>

  <!-- bottom ribbon -->
  <g transform="translate(540 900)">
    <rect x="-268" y="-52" width="536" height="104" rx="52" fill="url(#goldGrad)"
          stroke="#070A13" stroke-width="5"/>
    <text x="0" y="0" text-anchor="middle" font-family="'Anton', sans-serif" font-size="46"
          letter-spacing="4" fill="#131000">VOTE ROHIT</text>
    <text x="0" y="32" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16"
          font-weight="700" letter-spacing="4" fill="rgba(19,16,0,0.75)">RISING STAR · BY 15 JULY</text>
  </g>
</svg>
</div>

</body>
</html>
