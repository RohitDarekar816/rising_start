<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOTE ROHIT — Email Signature Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #04060c; }
  body { font-family: 'Space Grotesk', sans-serif; }

  .sig {
    width: 600px; height: 120px;
    background: #0B0E1A;
    border: 1px solid rgba(255,195,0,0.35);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px 0 16px;
    color: #F5F7FF;
  }

  .sig::before {
    content: '';
    position: absolute; top: -70px; right: -50px;
    width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,195,0,0.14) 0%, transparent 65%);
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow { 0%,100% { opacity: 0.7; } 50% { opacity: 1.2; } }

  .avatar {
    flex-shrink: 0;
    width: 84px; height: 84px; border-radius: 50%;
    border: 2.5px solid #FFC300;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(255,195,0,0.3);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 12%; }

  .text { flex: 1; min-width: 0; position: relative; z-index: 1; }
  .line1 {
    font-family: 'Anton', sans-serif;
    font-size: 23px; letter-spacing: 1px; text-transform: uppercase;
    line-height: 1.1;
  }
  .line1 .gold { color: #FFC300; }
  .line2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(245,247,255,0.55);
    margin-top: 6px;
  }
  .line2 b { color: #2EE87E; }
  .line3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 700; letter-spacing: 1px;
    color: #FF7A90;
    margin-top: 5px;
    display: flex; align-items: center; gap: 6px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #FF3B5C;
    box-shadow: 0 0 8px rgba(255,59,92,0.9);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .btn {
    flex-shrink: 0;
    position: relative; z-index: 1;
    font-family: 'Anton', sans-serif;
    font-size: 17px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #131000;
    background: linear-gradient(135deg, #FFD84D, #FFC300 55%, #E8AB00);
    padding: 13px 24px;
    border-radius: 100px;
    box-shadow: 0 6px 20px rgba(255,195,0,0.35);
    overflow: hidden;
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .btn::after {
    content: '';
    position: absolute; top: 0; bottom: 0; width: 36px;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.7), transparent);
    animation: sheen 4s ease infinite;
  }
  @keyframes sheen { 0% { left: -50px; } 35%, 100% { left: 120%; } }

  .star {
    position: absolute;
    color: #FFC300;
    animation: rise 4s linear infinite;
    z-index: 0;
  }
  @keyframes rise {
    0% { transform: translateY(130px); opacity: 0; }
    15% { opacity: 0.6; }
    85% { opacity: 0.6; }
    100% { transform: translateY(-30px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="sig">
  <span class="star" style="left:112px; font-size:11px; animation-delay:0s;">★</span>
  <span class="star" style="left:320px; font-size:9px; animation-delay:1s;">✦</span>
  <span class="star" style="left:238px; font-size:8px; animation-delay:2s;">✧</span>
  <span class="star" style="left:420px; font-size:10px; animation-delay:3s;">★</span>

  <div class="avatar"><img src="profilephoto.png" alt="Rohit Darekar"></div>
  <div class="text">
    <p class="line1">Vote <span class="gold">Rohit Darekar</span></p>
    <p class="line2">Rising Star of the Year <b>// TOP 8 FINALIST</b> · ACE Awards 2026</p>
    <p class="line3"><span class="live-dot"></span>VOTING CLOSES 15 JULY</p>
  </div>
  <div class="btn">Vote Now</div>
</div>

</body>
</html>
